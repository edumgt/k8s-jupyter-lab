name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Install backend test dependencies
        run: |
          pip install \
            "fastapi>=0.115,<1.0" \
            "pydantic-settings>=2.7,<3.0" \
            "kubernetes>=31.0,<33.0" \
            "pymongo>=4.10,<5.0" \
            "redis>=5.2,<6.0" \
            "httpx>=0.27,<1.0"

      - name: Ansible lint
        run: ansible-lint ansible/playbook.yml || true

      - name: Check shell scripts
        run: |
          bash -n scripts/build_ova.sh
          bash -n scripts/run_wsl.sh
          bash -n scripts/apply_k8s.sh
          bash -n scripts/reset_k8s.sh
          bash -n scripts/status_k8s.sh
          bash -n scripts/lib/kubernetes_runtime.sh
          bash -n scripts/healthcheck.sh
          bash -n scripts/verify.sh
          bash -n scripts/publish_dockerhub.sh
          bash -n scripts/prepare_offline_bundle.sh
          bash -n scripts/import_offline_bundle.sh
          bash -n scripts/export_gitlab_repos.sh
          bash -n tests/test_gitlab_repo_export.sh
          bash -n tests/test_prepare_offline_bundle.sh
          bash -n tests/test_wsl_scripts.sh

      - name: Python compile
        run: python -m compileall apps/backend/app apps/airflow/dags

      - name: Validate kustomize renders
        run: |
          kubectl kustomize infra/k8s/base >/dev/null
          kubectl kustomize infra/k8s/overlays/dev >/dev/null
          kubectl kustomize infra/k8s/overlays/prod >/dev/null
          kubectl kustomize infra/k8s/runner/base >/dev/null
          kubectl kustomize infra/k8s/runner/overlays/dev >/dev/null
          kubectl kustomize infra/k8s/runner/overlays/prod >/dev/null

      - name: Run shell tests
        run: |
          bash tests/test_wsl_scripts.sh
          bash tests/test_gitlab_repo_export.sh
          bash tests/test_prepare_offline_bundle.sh
          python3 tests/test_demo_auth_flow.py
