name: publish-images

on:
  push:
    branches:
      - main
    paths:
      - apps/**
      - infra/k8s/base/**
      - scripts/build_k8s_images.sh
      - scripts/publish_dockerhub.sh
      - .github/workflows/publish-images.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAMESPACE: edumgt
      IMAGE_TAG: latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish platform images
        run: bash scripts/publish_dockerhub.sh --namespace "${IMAGE_NAMESPACE}" --tag "${IMAGE_TAG}"
