apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-suite
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-suite-jupyter-session-manager
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
    verbs:
      - get
      - list
      - create
      - delete
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - create
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-suite-jupyter-session-manager
subjects:
  - kind: ServiceAccount
    name: platform-suite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-suite-jupyter-session-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-suite-control-plane-reader
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - nodes
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-suite-control-plane-reader
subjects:
  - kind: ServiceAccount
    name: platform-suite
    namespace: data-platform-offline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-suite-control-plane-reader
---
apiVersion: v1
kind: Service
metadata:
  name: platform-suite-frontend
spec:
  type: NodePort
  selector:
    app: platform-suite
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 31080
---
apiVersion: v1
kind: Service
metadata:
  name: platform-suite-backend
spec:
  type: NodePort
  selector:
    app: platform-suite
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 31081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-suite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-suite
  template:
    metadata:
      labels:
        app: platform-suite
    spec:
      serviceAccountName: platform-suite
      containers:
        - name: backend
          image: harbor.local/data-platform/k8s-data-platform-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          env:
            - name: PLATFORM_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          volumeMounts:
            - name: jupyter-workspace
              mountPath: /workspace/notebooks
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
        - name: frontend
          image: harbor.local/data-platform/k8s-data-platform-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: jupyter-workspace
          persistentVolumeClaim:
            claimName: jupyter-workspace
