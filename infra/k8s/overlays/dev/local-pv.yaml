apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-dev-gitlab-config
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: data-platform-dev
    name: gitlab-config
  hostPath:
    path: /var/lib/k8s-data-platform/pv/gitlab-config
    type: DirectoryOrCreate
---
