apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data-platform-dev

resources:
  - ../../base
  - namespace.yaml
  - local-pv.yaml

labels:
  - pairs:
      app.kubernetes.io/environment: dev

patches:
  - path: platform-configmap-patch.yaml
  - path: platform-secrets-patch.yaml
  - path: backend-clusterrolebinding-patch.yaml
  - path: airflow-clusterrolebinding-patch.yaml
  - path: mongodb-patch.yaml
